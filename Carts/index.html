<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carta de Amor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Parisienne&family=Nunito:wght@400;600;700&display=swap"
      rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="floating-hearts" aria-hidden="true"></div>
    <div class="sparkles" aria-hidden="true"></div>

    <main class="scene">
      <h1 class="page-title">Carta hacia mi amigo</h1>
      <p class="subtitle">Toca la carta para abrir esta sorpresa</p>

      <button
        id="loveEnvelope"
        class="envelope-wrapper"
        type="button"
        aria-label="Abrir carta romantica"
        aria-pressed="false">
        <div class="envelope">
          <div class="envelope-back"></div>
          <div class="letter" id="loveLetter">
            <h2>Amigo</h2>
            <p>
              Hola amigo, si lees esto es porque por fin pude encontrarme.
              Te acuerdas aquel tiempo en el que yo vivía solo y tuvimos esa
              charla
              larga de mi? Que yo decía que soy muy virgen como para encontrar a
              alguien hermoso y que si lo encontrara seria una persona idiota,
              ahí vos
              me detuviste, dijiste sorprendido, enojado y seguro “vos vas a
              encontrar
              a alguien que te mereces y te merece”. Tarde casi 22 años, para
              ser
              exactos 21 años y 5 meses. Desde entonces vivi cosas increíbles,
              para bien o para mal. Para mal porque por primera vez sentí que
              había
              llegado tarde yo, te acuerdas de mis abuelos? Alicia y Daniel.
              Bueno ellos lamentablemente no pudieron conocer a esta persona
              maravillosa, se fueron antes de que aparezca y eso me duele,
              pensar en lo orgulloso que estarían y en como la verían,
              escucharían
              su risa, su forma de hablar, su educación, su forma de pensar y
              sabrían que estoy en buenas manos, por suerte no fue tan tarde
              como
              para que conociera a mis viejos de quienes voy a estar agradecido
              de
              por vida porque hicieron que por sus formas de ser ella se
              enamorara
              mas de mi, si lo se, suena raro eso pero mas adelante entenderás.
            </p>
            <p>
              Se me hace raro nombrarla a ella como “persona maravillosa” no
              porque no lo sea, sino porque suena raro y por ello quiero darle
              un
              nombre… medica.
              Sin querer me di cuenta porque siempre le digo que es medica,
              y es porque ella ya curo mi corazón, no lo curo del todo pero
              gran parte y de a poco va curándolo. Yo se que vos amigo ya sabes
              como yo era y digo “era” porque cambie muchísimo para bien, mejore
              como persona, como amigo, como pareja, etc. y todo gracias a
              mi “medica”, me ayudo a sanar el corazón, a curar dolores, a
              llenar vacíos y todo demostrándome amor, yo intento devolvérselo
              como puedo, sabes amigo aveces ella me dice “yo aun no te
              devolví…”
              o “vos me diste mucho…” pero ella no sabe que yo necesito darle
              aun mas porque lo que me ayudo ella a mejorar no tiene valor.
            </p>
            <p>
              Aveces cuesta y MUUUCHO seguir realmente pero algo que aprendi es
              que
              para que pasen buenas cosas uno debe de salir de su zona de
              confort.
              Mi “medica” una vez me pregunto que busco en una mujer y lo pensé
              y mi respuesta es muy extensa pero en pocas palabras busco que
              sepa
              admitir sus errores, que tenga pensamiento critico, que sepa
              disculparse y por ultimo sepa escuchar, seguramente hay miles de
              cosas mas pero ahora no se me ocurren. Esto no quiere decir que es
              un excluyente porque las personas puede cambiar y mejorar y
              mi “medica” me demuestra eso, que ha mejorado y hace el esfuerzo
              como
              lo hago yo.
            </p>
            <p>
              Bueno amigo, acá queda mi carta no entra todo lo que quiero decir
              y aunque vivi un tiempo finito y podríamos decir corto con mi
              “medica” puedo estar hablándote infinito tiempo de ella, espero
              que sigas mejorando y ayudándome, hoy gracias a mi “medica”
              tengo plena confianza en vos.
            </p>
            <p class="signature">
              Feliz Dia a mi "Medica".
              <br />
              Con todo mi amor, siempre lo intentare.
            </p>
          </div>
          <div class="envelope-front"></div>
          <div class="flap"></div>
          <div class="seal" aria-hidden="true">&#10084;</div>
        </div>
      </button>

      <p class="hint" id="hintText">Haz clic para abrir</p>
    </main>

    <script src="script.js"></script>
  </body>
</html>
